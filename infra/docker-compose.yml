version: "3.8"
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: trecco
      POSTGRES_PASSWORD: trecco_dev
      POSTGRES_DB: trecco
    ports:
      - "5432:5432"
    volumes:
      - trecco_pg_data:/var/lib/postgresql/data

volumes:
  trecco_pg_data:
